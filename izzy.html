<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El rincón de Izzy 🐾</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="izzy-page">

    <div id="heart-container"></div> <header class="izzy-header">
        <h1 class="main-title">Nuestra pequeña Izzy</h1>
        <p class="izzy-subtitle">La que completa nuestra alegría cada día</p>
    </header>

    <main class="izzy-gallery">
        <div class="izzy-photos-container">
            <div class="photo-card visible">
                <img src="images/izzy1.jpg" alt="Izzy siendo linda">
                <p>Nuestra fiel compañera</p>
            </div>
            <div class="photo-card visible">
                <img src="images/izzy2.jpg" alt="Izzy con nosotros">
                <p>Amor incondicional</p>
            </div>
        </div>

        <div class="izzy-quote-box">
            <p class="izzy-phrase">
                "El amor tiene cuatro patas, una colita que no para de moverse y los ojos más sinceros del mundo. Gracias por ser parte de nuestra familia."
            </p>
        </div>

        <div class="back-container">
            <a href="index.html" class="back-btn">← Volver a nuestra historia</a>
        </div>
    </main>

    <script src="efectos.js"></script>
</body>
</html>
